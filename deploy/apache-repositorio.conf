# Referencia de configuración Apache para Ubuntu Server
# Instalación: sudo cp deploy/apache-repositorio.conf /etc/apache2/conf-available/repositorio.conf
#             sudo a2enconf repositorio && sudo systemctl reload apache2

Alias /repositorio /var/www/repositorio-apps/public

<Directory /var/www/repositorio-apps/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Límite de cuerpo de petición: 2 GB (alineado con REPOSITORIO_MAX_UPLOAD_KB=2097152)
LimitRequestBody 2147483648

# PHP (Ubuntu): copie valores de docs/php-upload-limits.ini.example a
# /etc/php/8.x/apache2/php.ini y reinicie Apache.

# Ejemplo de VirtualHost (ajustar según su servidor):
# <VirtualHost *:80>
#     ServerName 192.168.61.27
#     DocumentRoot /var/www/html
#
#     IncludeOptional /etc/apache2/sites-available/repositorio-alias.conf
# </VirtualHost>
